name: Build wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  # Monthly canary: builds wheels (cibuildwheel/manylinux drift is otherwise
  # only discovered at actual release time, the worst moment). The publish
  # job below stays gated on refs/tags/v*, so a schedule run never publishes.
  schedule:
    - cron: '25 3 1 * *'

permissions:
  contents: read

concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheels:
    name: Wheels / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            cibw_archs_linux: x86_64
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            cibw_archs_linux: aarch64
          - name: macos-arm64
            os: macos-latest
            cibw_archs_macos: arm64
            cibw_archs_linux: ""
          - name: macos-x86_64
            os: macos-15-intel
            cibw_archs_macos: x86_64
            cibw_archs_linux: ""
          - name: windows
            os: windows-latest
            cibw_archs_linux: ""

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          # macOS: each job builds only its native arch to avoid -march=native
          # cross-compilation issues in libhmm's SIMD detection.
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs_macos }}
          # libhmm v4 sets CMAKE_OSX_DEPLOYMENT_TARGET=13.0; the wheel target
          # must match or delocate rejects the bundled dylib.
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=13.0"
          # Linux: set per-matrix (x86_64 on x64 runner, aarch64 on native ARM runner)
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs_linux }}
          # Windows: x86_64 only
          CIBW_ARCHS_WINDOWS: "AMD64"
          # Skip PyPy, musllinux, and older Pythons (SPEC 0: 3.11 past 42-month window)
          CIBW_SKIP: "*-musllinux_* cp39-* cp310-* cp311-*"
          # Build frontend
          CIBW_BUILD_FRONTEND: "pip"
          # LIBHMM_PORTABLE=ON: swap -march=native for a portable baseline ISA
          # on LIBHMM_SIMD_SOURCES TUs so wheels do not SIGILL on machines with
          # a lower ISA than the build host.  Tier-2 runtime-dispatched kernels
          # (DoubleVecOps) are unaffected and still dispatch at full speed.
          # See libhmm issue #58 for the plan to extend tier-2 to these TUs.
          CIBW_CONFIG_SETTINGS: "cmake.define.LIBHMM_PORTABLE=ON"
          # Test the built wheel
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {project}/tests -q"
          # Ensure CMake is available in manylinux images
          CIBW_BEFORE_ALL_LINUX: "yum install -y cmake || apt-get install -y cmake || true"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.name }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Build sdist
        run: pip install build && python -m build --sdist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1 (v1.14.1)
        with:
          packages-dir: dist
