name: Build wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheels:
    name: Wheels / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            cibw_archs_linux: x86_64
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            cibw_archs_linux: aarch64
          - name: macos-arm64
            os: macos-latest
            cibw_archs_macos: arm64
            cibw_archs_linux: ""
          - name: macos-x86_64
            os: macos-15-intel
            cibw_archs_macos: x86_64
            cibw_archs_linux: ""
          - name: windows
            os: windows-latest
            cibw_archs_linux: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          # macOS: each job builds only its native arch to avoid -march=native
          # cross-compilation issues in libhmm's SIMD detection.
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs_macos }}
          # libhmm v4 sets CMAKE_OSX_DEPLOYMENT_TARGET=13.0; the wheel target
          # must match or delocate rejects the bundled dylib.
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=13.0"
          # Linux: set per-matrix (x86_64 on x64 runner, aarch64 on native ARM runner)
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs_linux }}
          # Windows: x86_64 only
          CIBW_ARCHS_WINDOWS: "AMD64"
          # Skip PyPy, musllinux, and older Pythons
          CIBW_SKIP: "*-musllinux_* cp39-* cp310-*"
          # Build frontend
          CIBW_BUILD_FRONTEND: "pip"
          # Test the built wheel
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {project}/tests -q"
          # Ensure CMake is available in manylinux images
          CIBW_BEFORE_ALL_LINUX: "yum install -y cmake || apt-get install -y cmake || true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: pip install build && python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
