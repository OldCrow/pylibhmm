name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Build and install
        run: pip install ".[test]" -v

      - name: Run tests
        run: pytest tests -v --tb=short

  # ---------------------------------------------------------------------------
  # AddressSanitizer — builds the extension with -fsanitize=address and runs
  # pytest under ASan via LD_PRELOAD.  Linux/GCC only: macOS ASan for Python
  # extensions requires DYLD_INSERT_LIBRARIES and SIP workarounds.
  # detect_leaks=0: CPython's memory allocator produces false positives.
  # Would have caught the calculator UAF (Finding 1) in the extension layer.
  # ---------------------------------------------------------------------------
  asan:
    name: ASan (ubuntu / Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build extension with ASan (libhmm + extension both instrumented)
        run: |
          # CMAKE_CXX_FLAGS propagates to the libhmm add_subdirectory build, so
          # all C++ code in the call stack (libhmm + _core.cpp) is uniformly
          # ASan-instrumented.  Without this, C++ exception unwinding from
          # uninstrumented libhmm frames into instrumented _core.cpp frames
          # triggers spurious ASan aborts.
          pip install ".[test]" \
            -Ccmake.define.CMAKE_CXX_FLAGS="-fsanitize=address -g -O1 -fno-omit-frame-pointer" \
            -Ccmake.define.CMAKE_SHARED_LINKER_FLAGS="-fsanitize=address"

      - name: Run tests under ASan
        run: |
          LIBASAN=$(gcc -print-file-name=libasan.so)
          # LD_PRELOAD is required: without it, Python's process lays out virtual
          # memory before the extension loads, and ASan cannot map its shadow
          # memory on top of the existing layout.
          #
          # -k 'not invalid': tests that exercise C++ exception propagation
          # (test_invalid_sigma, test_invalid, etc.) abort the process under
          # LD_PRELOAD ASan because the C++ unwinder crosses the
          # instrumented/non-instrumented boundary at CPython's frames.  This is
          # a fundamental limitation of testing a mixed ASan/non-ASan process.
          # These tests are fully exercised by the standard 3x3 CI matrix.
          # The ASan job targets memory bugs in computation paths (UAF, heap
          # corruption) — which it catches cleanly with libhmm also instrumented.
          LD_PRELOAD=$LIBASAN \
            PYTHONMALLOC=malloc \
            ASAN_OPTIONS=detect_leaks=0:alloc_dealloc_mismatch=0 \
            pytest tests -v --tb=short -k "not invalid"
