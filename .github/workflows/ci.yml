name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Build and install
        run: pip install ".[test]" -v

      - name: Run tests
        run: pytest tests -v --tb=short

  # ---------------------------------------------------------------------------
  # AddressSanitizer — builds the extension with -fsanitize=address and runs
  # pytest under ASan via LD_PRELOAD.  Linux/GCC only: macOS ASan for Python
  # extensions requires DYLD_INSERT_LIBRARIES and SIP workarounds.
  # detect_leaks=0: CPython's memory allocator produces false positives.
  # Would have caught the calculator UAF (Finding 1) in the extension layer.
  # ---------------------------------------------------------------------------
  asan:
    name: ASan (ubuntu / Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build extension with ASan
        run: |
          pip install ".[test]" \
            -Ccmake.define.CMAKE_CXX_FLAGS="-fsanitize=address -g -O1 -fno-omit-frame-pointer" \
            -Ccmake.define.CMAKE_SHARED_LINKER_FLAGS="-fsanitize=address"

      - name: Run tests under ASan
        run: |
          LIBASAN=$(gcc -print-file-name=libasan.so)
          # PYTHONMALLOC=malloc: CPython uses system malloc so ASan can track it.
          # detect_leaks=0: CPython GC has intentional leaks at shutdown.
          # alloc_dealloc_mismatch=0: suppresses false positives from mixed
          #   malloc implementations across CPython, numpy, and our extension.
          # abort_on_error omitted (default=0): ASan reports errors and lets
          #   the process continue; exception-propagation through non-instrumented
          #   CPython/numpy frames triggers false abort()s with abort_on_error=1.
          #   Real bugs (UAF, heap corruption) still crash the process and fail
          #   the job via exit code != 0.
          # Skip tests that test C++ exception propagation: C++ stack unwinding
          # through mixed ASan/non-ASan frames (CPython, numpy) causes spurious
          # aborts with LD_PRELOAD ASan. These paths are covered by the standard
          # CI matrix. The ASan job targets memory bugs in HMM computation.
          LD_PRELOAD=$LIBASAN \
            PYTHONMALLOC=malloc \
            ASAN_OPTIONS=detect_leaks=0:alloc_dealloc_mismatch=0 \
            pytest tests -v --tb=short -k "not invalid"
