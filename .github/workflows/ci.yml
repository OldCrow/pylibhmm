name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Build and install
        run: pip install ".[test]" -v

      - name: Run tests
        run: pytest tests -v --tb=short

  # ---------------------------------------------------------------------------
  # AddressSanitizer — builds the extension with -fsanitize=address and runs
  # pytest under ASan via LD_PRELOAD.  Linux/GCC only: macOS ASan for Python
  # extensions requires DYLD_INSERT_LIBRARIES and SIP workarounds.
  # detect_leaks=0: CPython's memory allocator produces false positives.
  # Would have caught the calculator UAF (Finding 1) in the extension layer.
  # ---------------------------------------------------------------------------
  asan:
    name: ASan (ubuntu / Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build extension with ASan (libhmm + extension both instrumented)
        run: |
          # CMAKE_CXX_FLAGS propagates to the libhmm add_subdirectory build so
          # the entire C++ call stack is uniformly ASan-instrumented.  Do NOT
          # set CMAKE_SHARED_LINKER_FLAGS: GCC already links libasan.so
          # automatically via -fsanitize=address; double-specifying causes
          # conflicts at dlopen time.
          pip install ".[test]" \
            -Ccmake.define.CMAKE_CXX_FLAGS="-fsanitize=address -g -O1 -fno-omit-frame-pointer"

      - name: Run tests under ASan
        run: |
          LIBASAN=$(gcc -print-file-name=libasan.so)
          LIBSTDCXX=$(gcc -print-file-name=libstdc++.so.6)
          # Root cause of previous failures: libasan.so is a DT_NEEDED of
          # _core.so, so when LD_PRELOAD loads libasan first, libstdc++ is not
          # yet loaded.  ASan's __cxa_throw interceptor gets
          # real___cxa_throw = nullptr, causing CHECK failed in
          # asan_interceptors.cpp:320 on any C++ exception.
          # Fix: preload libstdc++ before libasan so the real symbol is resolved
          # before ASan wraps it.  verify_asan_link_order=0 suppresses the
          # "ASan runtime does not come first" warning that follows.
          LD_PRELOAD="$LIBSTDCXX $LIBASAN" \
            PYTHONMALLOC=malloc \
            ASAN_OPTIONS=detect_leaks=0:alloc_dealloc_mismatch=0:verify_asan_link_order=0 \
            pytest tests -v --tb=short
