name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']
  # Monthly canary: catches drift with no code change to trigger it (Python
  # release cycle, runner image rolls) instead of discovering breakage at
  # the next real push.
  schedule:
    - cron: '20 3 1 * *'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # All 3 Python versions on Linux (cheap); macOS/Windows only test the
        # oldest+newest supported version — the version axis rarely diverges
        # by OS for a nanobind extension, and macOS/Windows runners cost
        # 10x/2x Linux minutes on private repos.
        include:
          - { os: ubuntu-latest,  python: "3.12" }
          - { os: ubuntu-latest,  python: "3.13" }
          - { os: ubuntu-latest,  python: "3.14" }
          - { os: macos-latest,   python: "3.12" }
          - { os: macos-latest,   python: "3.14" }
          - { os: windows-latest, python: "3.12" }
          - { os: windows-latest, python: "3.14" }
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python }}

      - name: Build and install
        run: pip install ".[test]" -v

      - name: Run tests
        run: pytest tests -v --tb=short

  # ---------------------------------------------------------------------------
  # ASan+UBSan run together in this one job (same runner, no extra cost) —
  # builds the extension with -fsanitize=address,undefined and runs pytest
  # under both via LD_PRELOAD.  Linux/GCC only: macOS ASan for Python
  # extensions requires DYLD_INSERT_LIBRARIES and SIP workarounds.
  # detect_leaks=0: CPython's memory allocator produces false positives.
  # Would have caught the calculator UAF (Finding 1) in the extension layer.
  # ---------------------------------------------------------------------------
  asan:
    name: ASan/UBSan (ubuntu / Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Build extension with ASan+UBSan (libhmm + extension both instrumented)
        run: |
          # CMAKE_CXX_FLAGS propagates to the libhmm add_subdirectory build so
          # the entire C++ call stack is uniformly ASan/UBSan-instrumented.  Do
          # NOT set CMAKE_SHARED_LINKER_FLAGS: GCC already links libasan.so
          # automatically via -fsanitize=address; double-specifying causes
          # conflicts at dlopen time.
          pip install ".[test]" \
            -Ccmake.define.CMAKE_CXX_FLAGS="-fsanitize=address,undefined -g -O1 -fno-omit-frame-pointer"

      - name: Run tests under ASan+UBSan
        run: |
          LIBASAN=$(gcc -print-file-name=libasan.so)
          LIBSTDCXX=$(gcc -print-file-name=libstdc++.so.6)
          # Root cause of previous failures: libasan.so is a DT_NEEDED of
          # _core.so, so when LD_PRELOAD loads libasan first, libstdc++ is not
          # yet loaded.  ASan's __cxa_throw interceptor gets
          # real___cxa_throw = nullptr, causing CHECK failed in
          # asan_interceptors.cpp:320 on any C++ exception.
          # Fix: preload libstdc++ before libasan so the real symbol is resolved
          # before ASan wraps it.  verify_asan_link_order=0 suppresses the
          # "ASan runtime does not come first" warning that follows.
          LD_PRELOAD="$LIBSTDCXX $LIBASAN" \
            PYTHONMALLOC=malloc \
            ASAN_OPTIONS=detect_leaks=0:alloc_dealloc_mismatch=0:verify_asan_link_order=0 \
            UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 \
            pytest tests -v --tb=short
